<text x="340" y="258" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Gemini LLM, structured JSON</text>
</g>
<line x1="340" y1="276" x2="340" y2="310" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

