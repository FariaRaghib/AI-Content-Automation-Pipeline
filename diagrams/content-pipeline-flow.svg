<svg width="680" height="536" viewBox="0 0 680 536" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img">
<title>Content generation and publishing pipeline</title>
<desc>Flowchart showing the LeadQualify content agent pipeline from scheduled trigger through competitor research, content generation, calendaring, image sourcing, and publishing to Instagram, LinkedIn, and blog.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect width="680" height="536" fill="#ffffff"/>

<g>
