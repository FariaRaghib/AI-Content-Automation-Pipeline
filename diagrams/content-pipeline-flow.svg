<text x="340" y="60" font-size="14" font-weight="600" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Scheduled trigger</text>
<text x="340" y="78" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">n8n cron job</text>
</g>
<line x1="340" y1="96" x2="340" y2="130" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

