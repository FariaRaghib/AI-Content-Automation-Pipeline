<svg width="680" height="584" viewBox="0 0 680 584" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img">
<title>Engagement and reporting workflow</title>
<desc>Flowchart showing how Instagram comments are monitored, scored for lead intent, routed to either an AI reply or logged and skipped, then rolled into a daily Telegram summary.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect width="680" height="584" fill="#ffffff"/>

<g>
<rect x="220" y="40" width="240" height="44" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="1"/>
<text x="340" y="62" font-size="14" font-weight="600" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">New Instagram comment</text>
</g>
<line x1="340" y1="84" x2="340" y2="118" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

<g>
<rect x="210" y="118" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
<text x="340" y="138" font-size="14" font-weight="600" text-anchor="middle" dominant-baseline="central" fill="#26215C">Lead scoring</text>
<text x="340" y="156" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Intent signal analysis</text>
</g>
<line x1="340" y1="174" x2="340" y2="204" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

<g>
<polygon points="340,204 430,250 340,296 250,250" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
<text x="340" y="250" font-size="14" font-weight="600" text-anchor="middle" dominant-baseline="central" fill="#412402">Qualified lead?</text>
</g>

<path d="M250 250 L180 250 L180 320" fill="none" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
<text x="150" y="280" font-size="12" text-anchor="middle" fill="#5F5E5A">No</text>
<path d="M430 250 L520 250 L520 320" fill="none" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
<text x="550" y="280" font-size="12" text-anchor="middle" fill="#5F5E5A">Yes</text>

<g>
<rect x="105" y="320" width="150" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
<text x="180" y="340" font-size="14" font-weight="600" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Log and skip</text>
</g>
<g>
<rect x="425" y="320" width="190" height="56" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
<text x="520" y="340" font-size="14" font-weight="600" text-anchor="middle" dominant-baseline="central" fill="#04342C">AI-generated reply</text>
</g>

<path d="M180 376 L180 410 L340 410" fill="none" stroke="#888780" stroke-width="1"/>
<path d="M520 376 L520 410 L340 410" fill="none" stroke="#888780" stroke-width="1"/>
<line x1="340" y1="410" x2="340" y2="420" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

<g>
<rect x="240" y="420" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
<text x="340" y="442" font-size="14" font-weight="600" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Daily summary</text>
</g>
<line x1="340" y1="464" x2="340" y2="500" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

<g>
<rect x="240" y="500" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
<text x="340" y="522" font-size="14" font-weight="600" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Telegram report</text>
</g>
</svg>
